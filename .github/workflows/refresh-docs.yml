name: Refresh docs

# Keeps the vendored docs in sync with the dittofs repo. Opens a PR on change.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Clone dittofs docs
        run: git clone --depth 1 https://github.com/marmos91/dittofs.git /tmp/dittofs
      - name: Sync docs
        run: DITTOFS_DOCS_DIR=/tmp/dittofs/docs npm run sync-docs
      - name: Open PR on change
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: sync from dittofs"
          title: "docs: sync from dittofs"
          branch: docs/auto-sync
          delete-branch: true
          body: Automated documentation sync from the dittofs repository.
